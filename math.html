<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Math Blast! 🧮</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root { --bg:#0d0b1e; --card:#1a1040; --accent:#ff6b9d; --accent2:#ffd93d; --text:#f0eaff; --muted:#9b8fc4; }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);font-family:'Nunito',sans-serif;color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px}
  .back-btn{position:fixed;top:16px;left:16px;background:rgba(255,255,255,0.1);border:none;color:white;padding:10px 18px;border-radius:100px;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;font-size:0.9rem;transition:background 0.2s;z-index:100;text-decoration:none;display:flex;align-items:center;gap:6px}
  .back-btn:hover{background:rgba(255,255,255,0.2)}
  h1{font-family:'Fredoka One',cursive;font-size:2.5rem;background:linear-gradient(135deg,#ff6b9d,#ffd93d);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin:60px 0 6px;text-align:center}
  .subtitle{color:var(--muted);margin-bottom:30px;font-size:1rem;text-align:center}
  .game-box{background:var(--card);border:2px solid rgba(255,107,157,0.2);border-radius:24px;padding:36px 40px;max-width:500px;width:100%;text-align:center}
  .score-row{display:flex;justify-content:space-between;margin-bottom:24px}
  .score-item{background:rgba(255,107,157,0.12);border-radius:12px;padding:10px 18px;font-weight:700}
  .score-label{font-size:0.75rem;color:var(--muted);display:block;margin-bottom:2px}
  .score-val{font-family:'Fredoka One',cursive;font-size:1.4rem;color:var(--accent)}
  .timer-bar-wrap{background:rgba(255,255,255,0.08);border-radius:100px;height:10px;margin-bottom:24px;overflow:hidden}
  .timer-bar{height:100%;border-radius:100px;background:linear-gradient(90deg,#ff6b9d,#ffd93d);transition:width 0.1s linear}
  .question-display{font-family:'Fredoka One',cursive;font-size:3rem;color:white;margin:20px 0;min-height:70px;display:flex;align-items:center;justify-content:center;gap:16px}
  .question-display .op{color:var(--accent2)}
  .answer-input{background:rgba(255,255,255,0.08);border:2px solid rgba(255,107,157,0.3);border-radius:16px;padding:16px;font-family:'Fredoka One',cursive;font-size:2rem;color:white;text-align:center;width:100%;margin-bottom:16px;outline:none;transition:border-color 0.2s}
  .answer-input:focus{border-color:var(--accent)}
  .submit-btn{background:linear-gradient(135deg,#ff6b9d,#ff4d7d);border:none;color:white;padding:14px 40px;border-radius:100px;font-family:'Fredoka One',cursive;font-size:1.3rem;cursor:pointer;transition:transform 0.2s,box-shadow 0.2s;width:100%}
  .submit-btn:hover{transform:scale(1.05);box-shadow:0 8px 30px rgba(255,107,157,0.4)}
  .feedback{font-family:'Fredoka One',cursive;font-size:1.8rem;min-height:50px;margin:12px 0;transition:all 0.3s}
  .feedback.correct{color:#a8ff78}
  .feedback.wrong{color:#ff6b6b}
  .level-badge{display:inline-block;background:rgba(255,217,61,0.15);border:1px solid rgba(255,217,61,0.3);color:var(--accent2);padding:4px 16px;border-radius:100px;font-weight:800;font-size:0.85rem;margin-bottom:12px}
  .start-screen,.game-over-screen{text-align:center}
  .start-screen h2,.game-over-screen h2{font-family:'Fredoka One',cursive;font-size:2rem;margin-bottom:12px;color:var(--accent)}
  .start-screen p{color:var(--muted);margin-bottom:24px;line-height:1.6}
  .start-btn{background:linear-gradient(135deg,#ff6b9d,#ffd93d);border:none;color:white;padding:16px 48px;border-radius:100px;font-family:'Fredoka One',cursive;font-size:1.4rem;cursor:pointer;transition:transform 0.2s;margin:8px}
  .start-btn:hover{transform:scale(1.08)}
  .diff-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-bottom:20px}
  .diff-btn{border:2px solid rgba(255,255,255,0.2);background:transparent;color:var(--text);padding:10px 20px;border-radius:100px;font-family:'Nunito',sans-serif;font-weight:700;cursor:pointer;transition:all 0.2s}
  .diff-btn.active,.diff-btn:hover{background:var(--accent);border-color:var(--accent);color:white}
  .stars-display{font-size:2rem;margin:12px 0}
  .final-score{font-family:'Fredoka One',cursive;font-size:3rem;color:var(--accent2);margin:10px 0}
  .hint-text{color:var(--muted);font-size:0.9rem;margin-top:10px}
</style>
</head>
<body>
<a href="index.html" class="back-btn">← Home</a>
<h1>🧮 Math Blast!</h1>
<p class="subtitle">Train your brain with fun maths!</p>

<div class="game-box" id="gameBox">
  <!-- Start Screen -->
  <div class="start-screen" id="startScreen">
    <h2>Ready to blast some maths? 💥</h2>
    <p>Answer as many questions as you can in 60 seconds!<br>Get combos for bonus points!</p>
    <div class="diff-btns">
      <button class="diff-btn active" onclick="setDiff(this,'easy')">😊 Easy</button>
      <button class="diff-btn" onclick="setDiff(this,'medium')">🔥 Medium</button>
      <button class="diff-btn" onclick="setDiff(this,'hard')">⚡ Hard</button>
    </div>
    <button class="start-btn" onclick="startGame()">🚀 Start!</button>
  </div>

  <!-- Game Screen -->
  <div id="gameScreen" style="display:none">
    <div class="score-row">
      <div class="score-item"><span class="score-label">Score</span><span class="score-val" id="score">0</span></div>
      <div class="score-item"><span class="score-label">Combo</span><span class="score-val" id="combo">x1</span></div>
      <div class="score-item"><span class="score-label">Time</span><span class="score-val" id="timer">60</span></div>
    </div>
    <div class="timer-bar-wrap"><div class="timer-bar" id="timerBar" style="width:100%"></div></div>
    <div class="level-badge" id="levelBadge">Level 1</div>
    <div class="question-display" id="questionDisplay"></div>
    <div class="feedback" id="feedback"></div>
    <input type="number" class="answer-input" id="answerInput" placeholder="?" onkeydown="if(event.key==='Enter')checkAnswer()">
    <button class="submit-btn" onclick="checkAnswer()">✓ Submit Answer</button>
    <p class="hint-text" id="hintText"></p>
  </div>

  <!-- Game Over -->
  <div id="gameOverScreen" style="display:none">
    <h2>Time's Up! ⏰</h2>
    <div class="stars-display" id="starsDisplay"></div>
    <div class="final-score" id="finalScore">0</div>
    <p style="color:var(--muted);margin-bottom:6px">points scored!</p>
    <p style="color:var(--accent2);font-weight:700;margin-bottom:20px" id="resultMsg"></p>
    <button class="start-btn" onclick="startGame()">🔄 Play Again</button>
    <button class="start-btn" style="background:rgba(255,255,255,0.1)" onclick="showStart()">🏠 Change Level</button>
  </div>
</div>

<script>
let score=0, combo=1, timeLeft=60, timerInterval, correct=0, total=0;
let currentAnswer=0, difficulty='easy', level=1, streak=0;
let questions=[];

function setDiff(btn, d){
  document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  difficulty=d;
}

function generateQuestion(){
  const ops = difficulty==='easy' ? ['+','-'] : difficulty==='medium' ? ['+','-','×'] : ['+','-','×','÷'];
  const op = ops[Math.floor(Math.random()*ops.length)];
  let a,b;
  if(difficulty==='easy'){a=Math.floor(Math.random()*20)+1;b=Math.floor(Math.random()*20)+1;}
  else if(difficulty==='medium'){a=Math.floor(Math.random()*50)+1;b=Math.floor(Math.random()*50)+1;}
  else{a=Math.floor(Math.random()*100)+1;b=Math.floor(Math.random()*100)+1;}
  
  if(op==='-'&&a<b){let t=a;a=b;b=t;}
  if(op==='×'){a=Math.floor(Math.random()*12)+1;b=Math.floor(Math.random()*12)+1;}
  if(op==='÷'){b=Math.floor(Math.random()*12)+1;a=b*(Math.floor(Math.random()*12)+1);}
  
  let ans;
  if(op==='+') ans=a+b;
  else if(op==='-') ans=a-b;
  else if(op==='×') ans=a*b;
  else ans=a/b;
  
  currentAnswer=ans;
  const hints=[`Think step by step!`,`You've got this, Sumaiya!`,`Take your time ✨`,`Almost there!`];
  document.getElementById('hintText').textContent=hints[Math.floor(Math.random()*hints.length)];
  document.getElementById('questionDisplay').innerHTML=`<span>${a}</span><span class="op">${op}</span><span>${b}</span><span>=</span><span>?</span>`;
  document.getElementById('answerInput').value='';
  document.getElementById('answerInput').focus();
}

function checkAnswer(){
  const val=parseFloat(document.getElementById('answerInput').value);
  if(isNaN(val)) return;
  total++;
  const fb=document.getElementById('feedback');
  if(val===currentAnswer){
    correct++;streak++;combo=Math.min(Math.floor(streak/3)+1,5);
    const pts=10*combo;score+=pts;
    fb.className='feedback correct';
    fb.textContent=['✅ Correct! +'+pts,'🎉 Amazing! +'+pts,'⭐ Brilliant! +'+pts,'🔥 On fire! +'+pts][Math.floor(Math.random()*4)];
    level=Math.floor(correct/5)+1;
    document.getElementById('levelBadge').textContent='Level '+level;
  } else {
    streak=0;combo=1;
    fb.className='feedback wrong';
    fb.textContent=['❌ Answer was '+currentAnswer,'💡 It was '+currentAnswer+', keep going!'][Math.floor(Math.random()*2)];
  }
  document.getElementById('score').textContent=score;
  document.getElementById('combo').textContent='x'+combo;
  setTimeout(generateQuestion,800);
}

function startGame(){
  score=0;combo=1;timeLeft=60;correct=0;total=0;streak=0;level=1;
  document.getElementById('startScreen').style.display='none';
  document.getElementById('gameOverScreen').style.display='none';
  document.getElementById('gameScreen').style.display='block';
  document.getElementById('score').textContent='0';
  document.getElementById('combo').textContent='x1';
  document.getElementById('feedback').textContent='';
  generateQuestion();
  clearInterval(timerInterval);
  timerInterval=setInterval(()=>{
    timeLeft--;
    document.getElementById('timer').textContent=timeLeft;
    document.getElementById('timerBar').style.width=(timeLeft/60*100)+'%';
    if(timeLeft<=0){clearInterval(timerInterval);endGame();}
  },1000);
}

function endGame(){
  document.getElementById('gameScreen').style.display='none';
  document.getElementById('gameOverScreen').style.display='block';
  document.getElementById('finalScore').textContent=score;
  const pct=total>0?Math.round(correct/total*100):0;
  const stars=score>200?'⭐⭐⭐':score>100?'⭐⭐':'⭐';
  document.getElementById('starsDisplay').textContent=stars;
  const msgs=[`You got ${correct}/${total} correct (${pct}%)!`,`Wow, ${correct} correct answers!`,`${pct}% accuracy — incredible!`];
  document.getElementById('resultMsg').textContent=msgs[0];
}

function showStart(){
  document.getElementById('gameOverScreen').style.display='none';
  document.getElementById('gameScreen').style.display='none';
  document.getElementById('startScreen').style.display='block';
}
</script>
</body>
</html>
